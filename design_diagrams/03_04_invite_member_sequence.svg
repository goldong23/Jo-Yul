<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="785" viewBox="0 0 1140 785">
<style>text{font-family:Arial,'Malgun Gothic',sans-serif}.title{font-size:22px;font-weight:700;fill:#1f2937}.boxTitle{font-size:14px;font-weight:700;fill:#111827}.small{font-size:12px;fill:#374151}.msg{font-size:12px;fill:#111827}.muted{font-size:11px;fill:#6b7280}</style>
<rect width="100%" height="100%" fill="#ffffff"/>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker></defs>
<text x="40" y="44" class="title">Sequence Diagram 4</text>
<rect x="5" y="58" width="130" height="38" rx="8" fill="#eff6ff" stroke="#2563eb"/>
<text x="70" y="82" text-anchor="middle" class="boxTitle">Admin</text>
<line x1="70" y1="96" x2="70" y2="750" stroke="#cbd5e1" stroke-dasharray="5,5"/>
<rect x="195" y="58" width="130" height="38" rx="8" fill="#eff6ff" stroke="#2563eb"/>
<text x="260" y="82" text-anchor="middle" class="boxTitle">MainActivity</text>
<line x1="260" y1="96" x2="260" y2="750" stroke="#cbd5e1" stroke-dasharray="5,5"/>
<rect x="385" y="58" width="130" height="38" rx="8" fill="#eff6ff" stroke="#2563eb"/>
<text x="450" y="82" text-anchor="middle" class="boxTitle">SupabaseAuthClient</text>
<line x1="450" y1="96" x2="450" y2="750" stroke="#cbd5e1" stroke-dasharray="5,5"/>
<rect x="575" y="58" width="130" height="38" rx="8" fill="#eff6ff" stroke="#2563eb"/>
<text x="640" y="82" text-anchor="middle" class="boxTitle">members table</text>
<line x1="640" y1="96" x2="640" y2="750" stroke="#cbd5e1" stroke-dasharray="5,5"/>
<rect x="765" y="58" width="130" height="38" rx="8" fill="#eff6ff" stroke="#2563eb"/>
<text x="830" y="82" text-anchor="middle" class="boxTitle">Team</text>
<line x1="830" y1="96" x2="830" y2="750" stroke="#cbd5e1" stroke-dasharray="5,5"/>
<line x1="70" y1="145" x2="260" y2="145" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="165.0" y="137" text-anchor="middle" class="msg">닉네임으로 초대</text>
<line x1="260" y1="200" x2="450" y2="200" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="355.0" y="192" text-anchor="middle" class="msg">findMemberByNickname(nickname)</text>
<line x1="450" y1="255" x2="640" y2="255" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="545.0" y="247" text-anchor="middle" class="msg">nickname 존재 여부 조회</text>
<rect x="35" y="288" width="1070" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" opacity="0.9"/>
<text x="50" y="310" class="small">alt: 가입된 닉네임</text>
<line x1="450" y1="365" x2="260" y2="365" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="355.0" y="357" text-anchor="middle" class="msg">onFound(nickname)</text>
<line x1="260" y1="420" x2="830" y2="420" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="545.0" y="412" text-anchor="middle" class="msg">invite(nickname)</text>
<line x1="260" y1="475" x2="70" y2="475" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="165.0" y="467" text-anchor="middle" class="msg">초대 완료 또는 중복 안내</text>
<rect x="35" y="508" width="1070" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" opacity="0.9"/>
<text x="50" y="530" class="small">else: 미가입 닉네임</text>
<line x1="450" y1="585" x2="260" y2="585" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="355.0" y="577" text-anchor="middle" class="msg">onNotFound()</text>
<line x1="260" y1="640" x2="70" y2="640" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="165.0" y="632" text-anchor="middle" class="msg">해당 닉네임 없음 안내</text>
</svg>