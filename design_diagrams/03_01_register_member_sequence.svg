<text x="355.0" y="262" text-anchor="middle" class="msg">)</text>
<line x1="450" y1="322" x2="640" y2="322" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="545.0" y="314" text-anchor="middle" class="msg">members 닉네임 중복 조회</text>
