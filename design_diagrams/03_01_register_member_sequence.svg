<text x="165.0" y="137" text-anchor="middle" class="msg">회원가입 선택</text>
<path d="M260 200 C330 200 330 230 260 230" fill="none" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
