<svg xmlns="http://www.w3.org/2000/svg" width="950" height="840" viewBox="0 0 950 840">
<style>text{font-family:Arial,'Malgun Gothic',sans-serif}.title{font-size:22px;font-weight:700;fill:#1f2937}.boxTitle{font-size:14px;font-weight:700;fill:#111827}.small{font-size:12px;fill:#374151}.msg{font-size:12px;fill:#111827}.muted{font-size:11px;fill:#6b7280}</style>
<rect width="100%" height="100%" fill="#ffffff"/>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker></defs>
<text x="40" y="44" class="title">Sequence Diagram 2</text>
<rect x="5" y="58" width="130" height="38" rx="8" fill="#eff6ff" stroke="#2563eb"/>
<text x="70" y="82" text-anchor="middle" class="boxTitle">User</text>
<line x1="70" y1="96" x2="70" y2="805" stroke="#cbd5e1" stroke-dasharray="5,5"/>
<rect x="195" y="58" width="130" height="38" rx="8" fill="#eff6ff" stroke="#2563eb"/>
<text x="260" y="82" text-anchor="middle" class="boxTitle">MainActivity</text>
<line x1="260" y1="96" x2="260" y2="805" stroke="#cbd5e1" stroke-dasharray="5,5"/>
<rect x="385" y="58" width="130" height="38" rx="8" fill="#eff6ff" stroke="#2563eb"/>
<text x="450" y="82" text-anchor="middle" class="boxTitle">SupabaseAuthClient</text>
<line x1="450" y1="96" x2="450" y2="805" stroke="#cbd5e1" stroke-dasharray="5,5"/>
<rect x="575" y="58" width="130" height="38" rx="8" fill="#eff6ff" stroke="#2563eb"/>
<text x="640" y="82" text-anchor="middle" class="boxTitle">Supabase Auth</text>
<line x1="640" y1="96" x2="640" y2="805" stroke="#cbd5e1" stroke-dasharray="5,5"/>
<line x1="70" y1="145" x2="260" y2="145" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="165.0" y="137" text-anchor="middle" class="msg">이메일/비밀번호 입력</text>
<path d="M260 200 C330 200 330 230 260 230" fill="none" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="338" y="205" text-anchor="middle" class="msg">형식 및 길이 검증</text>
<line x1="260" y1="255" x2="450" y2="255" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="355.0" y="247" text-anchor="middle" class="msg">signIn(email, password)</text>
<line x1="450" y1="310" x2="640" y2="310" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="545.0" y="302" text-anchor="middle" class="msg">/auth/v1/token?grant_type=password</text>
<rect x="35" y="343" width="880" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" opacity="0.9"/>
<text x="50" y="365" class="small">alt: 인증 성공</text>
<line x1="640" y1="420" x2="450" y2="420" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="545.0" y="412" text-anchor="middle" class="msg">access token + user metadata</text>
<line x1="450" y1="475" x2="260" y2="475" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="355.0" y="467" text-anchor="middle" class="msg">AuthSession</text>
<line x1="260" y1="530" x2="70" y2="530" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="165.0" y="522" text-anchor="middle" class="msg">Home 화면 표시</text>
<rect x="35" y="563" width="880" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" opacity="0.9"/>
<text x="50" y="585" class="small">else: Invalid login credentials</text>
<line x1="450" y1="640" x2="260" y2="640" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="355.0" y="632" text-anchor="middle" class="msg">사용자 안내 메시지</text>
<line x1="260" y1="695" x2="70" y2="695" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="165.0" y="687" text-anchor="middle" class="msg">&quot;회원이 아닙니다. 회원가입을 진행해주세요.&quot;</text>
</svg>