<svg xmlns="http://www.w3.org/2000/svg" width="900" height="510" viewBox="0 0 900 510">
<style>text{font-family:Arial,'Malgun Gothic',sans-serif}.title{font-size:22px;font-weight:700;fill:#1f2937}.boxTitle{font-size:14px;font-weight:700;fill:#111827}.small{font-size:12px;fill:#374151}.msg{font-size:12px;fill:#111827}.muted{font-size:11px;fill:#6b7280}</style>
<rect width="100%" height="100%" fill="#ffffff"/>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker></defs>
<text x="40" y="44" class="title">Sequence Diagram 5</text>
<rect x="5" y="58" width="130" height="38" rx="8" fill="#eff6ff" stroke="#2563eb"/>
<text x="70" y="82" text-anchor="middle" class="boxTitle">Member</text>
<line x1="70" y1="96" x2="70" y2="475" stroke="#cbd5e1" stroke-dasharray="5,5"/>
<rect x="195" y="58" width="130" height="38" rx="8" fill="#eff6ff" stroke="#2563eb"/>
<text x="260" y="82" text-anchor="middle" class="boxTitle">MainActivity</text>
<line x1="260" y1="96" x2="260" y2="475" stroke="#cbd5e1" stroke-dasharray="5,5"/>
<rect x="385" y="58" width="130" height="38" rx="8" fill="#eff6ff" stroke="#2563eb"/>
<text x="450" y="82" text-anchor="middle" class="boxTitle">teamScheduleCells</text>
<line x1="450" y1="96" x2="450" y2="475" stroke="#cbd5e1" stroke-dasharray="5,5"/>
<line x1="70" y1="145" x2="260" y2="145" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="165.0" y="137" text-anchor="middle" class="msg">일정 탭 진입</text>
<line x1="260" y1="200" x2="450" y2="200" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="355.0" y="192" text-anchor="middle" class="msg">current team + nickname cell set 조회</text>
<line x1="260" y1="255" x2="70" y2="255" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="165.0" y="247" text-anchor="middle" class="msg">09-23시 평일 grid 표시</text>
<line x1="70" y1="310" x2="260" y2="310" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="165.0" y="302" text-anchor="middle" class="msg">불가능 시간 cell 선택/해제</text>
<line x1="260" y1="365" x2="450" y2="365" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="355.0" y="357" text-anchor="middle" class="msg">cell key 추가 또는 제거</text>
<line x1="260" y1="420" x2="70" y2="420" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="165.0" y="412" text-anchor="middle" class="msg">선택한 cell 색상만 갱신</text>
</svg>